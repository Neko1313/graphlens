[project]
name = "graphlens-php"
version = "0.6.1"
description = "PHP language adapter for graphlens"
requires-python = ">=3.13"
dependencies = [
    "graphlens",
    "tree-sitter>=0.24",
    "tree-sitter-php>=0.23",
]

[build-system]
requires = ["uv_build>=0.9.18,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
graphlens = { workspace = true }

[project.entry-points."graphlens.adapters"]
php = "graphlens_php:PhpAdapter"

[tool.bandit]
skips = ["B101", "B404", "B603"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["graphlens", "graphlens_php"]

[tool.coverage.report]
fail_under = 100
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "\\.\\.\\.",
]
