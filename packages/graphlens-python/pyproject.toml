[project]
name = "graphlens-python"
version = "0.6.0"
description = "Python language adapter for graphlens"
requires-python = ">=3.13"
dependencies = [
    "graphlens",
    "tree-sitter>=0.24",
    "tree-sitter-python>=0.23",
    # Pinned: ty is pre-1.0; 0.0.x releases can change LSP/diagnostic
    # behaviour, so float-pinning makes analysis non-reproducible.
    "ty==0.0.26",
]

[build-system]
requires = ["uv_build>=0.9.18,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
graphlens = { workspace = true }

[project.entry-points."graphlens.adapters"]
python = "graphlens_python:PythonAdapter"

[tool.bandit]
skips = ["B101", "B404", "B603"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["graphlens", "graphlens_python"]

[tool.coverage.report]
fail_under = 100
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "\\.\\.\\.",
]
