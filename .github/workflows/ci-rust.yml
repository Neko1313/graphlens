name: "CI: rust"

on:
  pull_request:
    branches: ["*"]
    paths:
      - "packages/graphlens-rust/**"
      - "ci-rust.yml"
      - "pyproject.toml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task install

      - name: Lint
        run: task rust:lint CI=true

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install rust-analyzer (semantic resolver for TCK-12)
        run: |
          rustup component add rust-analyzer
          echo "$(dirname "$(rustup which rust-analyzer)")" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: task install

      - name: Test
        run: task rust:test CI=true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/graphlens-rust/reports/coverage.xml
          flags: rust
          fail_ci_if_error: true

      - name: Upload test analytics to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/graphlens-rust/reports/junit.xml
          flags: rust
          report_type: test_results
          fail_ci_if_error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-test-results
          path: packages/graphlens-rust/reports/
